<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> login page </title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/public.css">
</head><body>
    <main class="login-page">

        <section class="login-hero">
            <img src="../../img/public/hero.jpg" alt="Elderly care image" class="hero-image">

            <div class="login-card">

                <div class="logo-section">
                    <img src="../../img/public/hero.jpg" alt="LaanKalinga Logo" class="logo">
                    <h5>Laan-Kalinga</h5>
                </div>

                <div class="form-section">
                    <p class="subtitle">Sign in to your account</p>

                    <form id="loginForm" action="#" method="POST">

                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="Enter your email">
                        </div>

                        <div class="form-group">
                            <label for="password">Password</label>

                            <div class="input-wrapper">
                                <img src="../../svg/pass.svg" class="input-icon">

                                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">

                                <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
                                    <img src="../../svg/hidepass.svg" id="iconEyeVisible">
                                    <img src="../../svg/viewpass.svg" id="iconEyeHidden">
                                </button>
                            </div>

                            <span class="error-msg" id="passwordError">
                                Password must be at least 6 characters.
                            </span>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox" name="remember">
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-link"> Forgot Password? </a>
                        </div>

                        <button type="submit" class="btn-primary">
                            Sign In
                        </button>
                    </form>

                    <div class="divider">
                        <span>or</span>
                    </div>

                    <p class="register-link">
                        Don't have an account?
                        <a href="register-family.html">Register here</a>
                    </p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="login-footer-bottom">
            <p>&copy; 2026 Laan-Kalinga. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
